app = "caf-renderer"
primary_region = "ams"

[vm]
  # Puppeteer/Chromium need more than 1GB under load; OOM causes SIGKILL and 502s
  memory = "2gb"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3333
  force_https = true
  processes = ["app"]
  # Single machine, never autostop — prevents "excess capacity, autostopping" and cold starts.
  min_machines_running = 1
  max_machines_running = 1
  auto_stop_machines = false
  auto_start_machines = true
  # Per-machine concurrency (single object, not array).
  [http_service.concurrency]
  type = "requests"
  hard_limit = 30
  soft_limit = 10

  # Give Node time to start; if health fails here the app "never starts" from Fly's perspective
  [[http_service.checks]]
  grace_period = "90s"
  interval = "15s"
  timeout = "20s"
  method = "GET"
  path = "/health"

